<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit-Checker</title>

<style>
:root{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#222;
    --primary:#4f46e5;
    --success:#16a34a;
    --warning:#dc2626;
    --border:#dcdcdc;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
    --primary:#818cf8;
    --success:#4ade80;
    --warning:#f87171;
    --border:#333;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    margin-bottom:25px;
    opacity:0.8;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

select,
input{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--card);
    color:var(--text);
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:var(--primary);
    color:white;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.toggle{
    margin-bottom:15px;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:12px;
    display:none;
}

.good{
    background:rgba(22,163,74,0.15);
    border-left:5px solid var(--success);
}

.bad{
    background:rgba(220,38,38,0.15);
    border-left:5px solid var(--warning);
}

ul{
    margin-top:10px;
    padding-left:20px;
}

.tip-box{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background:rgba(79,70,229,0.08);
}
</style>
</head>
<body>

<div class="container">

    <div class="toggle">
        <button onclick="toggleTheme()">🌙 Hell-/Dunkelmodus wechseln</button>
    </div>

    <div class="card">

        <h1>👕 Outfit-Checker</h1>

        <p class="subtitle">
            Prüfe, ob dein Outfit zum Wetter und Anlass passt.
        </p>

        <label>Wetter</label>
        <select id="weather">
            <option>Sonnig</option>
            <option>Mild</option>
            <option>Kalt</option>
            <option>Regen</option>
        </select>

        <label>Anlass</label>
        <select id="occasion">
            <option>Schule</option>
            <option>Freizeit</option>
            <option>Sport</option>
            <option>Party</option>
            <option>Bewerbungsgespräch</option>
        </select>

        <label>Kleidungsstücke (mindestens 2, mit Komma trennen)</label>
        <input
            type="text"
            id="clothes"
            placeholder="z.B. T-Shirt, Jeans, Sneaker"
        >

        <button onclick="checkOutfit()">
            Outfit prüfen
        </button>

        <div id="result" class="result"></div>

    </div>

</div>

<script>

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function checkOutfit(){

    const weather = document.getElementById("weather").value;
    const occasion = document.getElementById("occasion").value;

    const clothes = document
        .getElementById("clothes")
        .value
        .toLowerCase()
        .split(",")
        .map(item => item.trim())
        .filter(item => item !== "");

    const result = document.getElementById("result");

    if(clothes.length < 2){
        result.style.display = "block";
        result.className = "result bad";
        result.innerHTML =
        "<h3>❌ Bitte mindestens zwei Kleidungsstücke eingeben.</h3>";
        return;
    }

    let score = 100;
    let reasons = [];
    let suggestions = [];

    const has = (item) => clothes.some(c => c.includes(item));

    // Wetter prüfen

    if(weather === "Kalt"){
        if(!has("jacke") && !has("hoodie") && !has("pullover")){
            score -= 30;
            reasons.push("Bei kaltem Wetter fehlt warme Kleidung.");
            suggestions.push("Jacke, Hoodie oder Pullover hinzufügen.");
        }
    }

    if(weather === "Regen"){
        if(!has("jacke")){
            score -= 25;
            reasons.push("Bei Regen wäre eine Jacke sinnvoll.");
            suggestions.push("Regenjacke oder wasserfeste Jacke tragen.");
        }
    }

    if(weather === "Sonnig"){
        if(has("winterjacke")){
            score -= 25;
            reasons.push("Die Winterjacke wirkt für sonniges Wetter zu warm.");
            suggestions.push("Leichte Kleidung wählen.");
        }
    }

    // Anlass prüfen

    if(occasion === "Sport"){
        if(!has("sport") && !has("shorts") && !has("trainings")){
            score -= 30;
            reasons.push("Das Outfit wirkt nicht sportlich.");
            suggestions.push("Sportkleidung oder Shorts ergänzen.");
        }
    }

    if(occasion === "Bewerbungsgespräch"){
        if(has("jogginghose")){
            score -= 40;
            reasons.push("Jogginghose wirkt für ein Bewerbungsgespräch zu locker.");
            suggestions.push("Jeans, Stoffhose oder Hemd tragen.");
        }
    }

    if(occasion === "Party"){
        if(has("trainingshose")){
            score -= 20;
            reasons.push("Trainingshose wirkt für eine Party eher unpassend.");
            suggestions.push("Jeans oder modische Hose wählen.");
        }
    }

    // Ergebnis erzeugen

    let status = "";
    let explanation = "";

    if(score >= 80){
        status = "✅ Outfit passt gut zusammen!";
        explanation =
            "Deine Auswahl passt insgesamt gut zum Wetter und zum Anlass.";
        result.className = "result good";
    }else{
        status = "⚠️ Outfit kann verbessert werden";
        explanation =
            "Einige Teile passen nicht optimal zum Wetter oder Anlass.";
        result.className = "result bad";
    }

    if(reasons.length === 0){
        reasons.push("Keine auffälligen Probleme erkannt.");
    }

    if(suggestions.length === 0){
        suggestions.push("Outfit beibehalten – sieht passend aus.");
    }

    const colorTips = [
        "Blau + Weiß wirkt frisch und zeitlos.",
        "Schwarz + Grau wirkt modern und schlicht.",
        "Beige + Weiß wirkt freundlich und elegant.",
        "Dunkelblau + Beige harmoniert sehr gut.",
        "Schwarz + Rot setzt starke Akzente."
    ];

    const styleTips = [
        "Sneaker passen zu vielen Freizeit-Outfits.",
        "Weniger Farben wirken oft harmonischer.",
        "Eine Jacke kann ein Outfit optisch aufwerten.",
        "Passende Schuhe machen einen großen Unterschied.",
        "Basics lassen sich leicht kombinieren."
    ];

    const randomColor =
        colorTips[Math.floor(Math.random()*colorTips.length)];

    const randomStyle =
        styleTips[Math.floor(Math.random()*styleTips.length)];

    result.innerHTML = `
        <h2>${status}</h2>
        <br>

        <strong>Warum?</strong>
        <p>${explanation}</p>

        <br>

        <strong>Analyse:</strong>
        <ul>
            ${reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>

        <br>

        <strong>Verbesserungsvorschläge:</strong>
        <ul>
            ${suggestions.map(s => `<li>${s}</li>`).join("")}
        </ul>

        <div class="tip-box">
            <strong>🎨 Farb-Tipp:</strong><br>
            ${randomColor}
        </div>

        <div class="tip-box">
            <strong>✨ Style-Tipp:</strong><br>
            ${randomStyle}
        </div>
    `;

    result.style.display = "block";
}
</script>

</body>
</html>
